learning_rate: 6.0e-4
min_lr: 6.0e-5  # 10% of peak
warmup_steps: 2000
max_steps: 60000
batch_size: 32  # sequences per step
gradient_accumulation_steps: 2  # effective batch = 64
max_grad_norm: 1.0
weight_decay: 0.1
betas: [0.9, 0.95]
dtype: bfloat16

checkpoint_every: 5000
eval_every: 1000
log_every: 100

seed: 42
